<style>
:root{--bg:#0F0E0C;--bg-elev:#1A1816;--bg-elev-hover:#221F1C;--ink:#F4EFE6;--ink-dim:#A39B8E;--ink-faint:#6B6358;--accent:#C9A271;--accent-glow:rgba(201,162,113,.15);--border:rgba(244,239,230,.08);--border-strong:rgba(244,239,230,.14);--shadow:0 30px 60px -20px rgba(0,0,0,.5)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink)}
body{font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;line-height:1.55;min-height:100dvh;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,var(--accent-glow),transparent 70%),radial-gradient(ellipse 60% 40% at 50% 110%,rgba(201,162,113,.05),transparent 60%);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.04;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.container{max-width:480px;margin:0 auto;padding:48px 24px;position:relative;z-index:2}
.hero{text-align:center;padding:16px 0 40px;animation:rise .8s cubic-bezier(.16,1,.3,1) both}
.avatar{width:116px;height:116px;border-radius:50%;margin:0 auto 28px;background:var(--bg-elev);border:1px solid var(--border-strong);overflow:hidden;box-shadow:var(--shadow)}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:42px;color:var(--accent)}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.name{font-family:'Fraunces',serif;font-size:clamp(30px,7.5vw,40px);font-weight:400;line-height:1.05;letter-spacing:-.02em;margin-bottom:14px}
.name em{font-style:italic;font-weight:300;color:var(--accent)}
.title{font-size:14px;color:var(--ink-dim);font-weight:400;max-width:340px;margin:0 auto;line-height:1.5}
.company{font-size:13px;color:var(--ink-faint);font-weight:400;margin-top:6px}
.cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px 24px;background:var(--accent);color:var(--bg);border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:32px;transition:transform .2s,box-shadow .3s;box-shadow:0 8px 24px -8px var(--accent-glow),0 1px 0 rgba(255,255,255,.1) inset;animation:rise .8s cubic-bezier(.16,1,.3,1) .15s both}
.cta:active{transform:scale(.98)}
.cta:hover{box-shadow:0 12px 32px -10px var(--accent),0 1px 0 rgba(255,255,255,.15) inset}
.cta svg{width:18px;height:18px}
.actions{display:grid;gap:10px;animation:rise .8s cubic-bezier(.16,1,.3,1) .25s both}
.action{display:flex;align-items:center;gap:16px;padding:18px 20px;background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;color:var(--ink);text-decoration:none;font-size:15px;font-weight:500;transition:background .2s,border-color .2s,transform .15s}
.action:hover{background:var(--bg-elev-hover);border-color:var(--border-strong)}
.action:active{transform:scale(.99)}
.action-icon{width:38px;height:38px;border-radius:10px;background:rgba(201,162,113,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent)}
.action-icon svg{width:18px;height:18px}
.action-body{flex:1;min-width:0}
.action-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);font-weight:500;margin-bottom:3px}
.action-value{font-size:15px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.action-chevron{color:var(--ink-faint);flex-shrink:0;transition:transform .2s,color .2s}
.action:hover .action-chevron{color:var(--accent);transform:translateX(2px)}
.footer{margin-top:40px;text-align:center;animation:rise .8s cubic-bezier(.16,1,.3,1) .4s both}
.share-btn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border-strong);color:var(--ink-dim);padding:11px 22px;border-radius:100px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}
.share-btn svg{width:14px;height:14px}
.divider{margin:32px auto 20px;width:32px;height:1px;background:var(--border-strong)}
.legal{font-family:'Fraunces',serif;font-style:italic;font-size:12px;color:var(--ink-faint)}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:100px;font-size:13px;font-weight:600;box-shadow:0 12px 32px -8px rgba(0,0,0,.5);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:100;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

function fullName(){return(PROFILE.honorific?PROFILE.honorific+' ':'')+PROFILE.firstName+' '+PROFILE.lastName}

function render(){
  const av=document.getElementById('avatar');
  if(PROFILE.photo){av.innerHTML=`<img src="${PROFILE.photo}" alt="${fullName()}">`}
  else{const i=(PROFILE.firstName[0]||'')+(PROFILE.lastName[0]||'');av.innerHTML=`<div class="avatar-fallback">${i.toUpperCase()}</div>`}
  document.getElementById('eyebrow').textContent=PROFILE.eyebrow||'';
  document.getElementById('name').innerHTML=`${PROFILE.honorific?`<em>${PROFILE.honorific}</em> `:''}${PROFILE.firstName} ${PROFILE.lastName}`;
  document.getElementById('title').textContent=PROFILE.title||'';
  document.getElementById('company').textContent=PROFILE.company||'';
  document.getElementById('ctaText').textContent=T.cta;
  document.getElementById('shareText').textContent=T.share;
  document.getElementById('legal').textContent=PROFILE.legal||'';
  const actions=[
    PROFILE.phone&&{icon:'call',label:T.call,value:PROFILE.phone,href:`tel:${PROFILE.phone.replace(/\s/g,'')}`},
    PROFILE.whatsapp&&{icon:'whatsapp',label:T.whatsapp,value:PROFILE.whatsapp,href:`https://wa.me/${PROFILE.whatsapp.replace(/[^0-9]/g,'')}`},
    PROFILE.email&&{icon:'email',label:T.email,value:PROFILE.email,href:`mailto:${PROFILE.email}`},
    PROFILE.website&&{icon:'website',label:T.website,value:PROFILE.website.replace(/^https?:\/\//,'').replace(/\/$/,''),href:PROFILE.website},
    PROFILE.linkedin&&{icon:'linkedin',label:T.linkedin,value:'linkedin.com/in/javier-matías-henríquez',href:PROFILE.linkedin},
    PROFILE.instagram&&{icon:'instagram',label:T.instagram,value:'@'+PROFILE.instagram.split('instagram.com/')[1]?.replace(/\/$/,''),href:PROFILE.instagram},
    PROFILE.address&&{icon:'address',label:T.address,value:PROFILE.address,href:`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(PROFILE.mapsQuery||PROFILE.address)}`}
  ].filter(Boolean);
  document.getElementById('actions').innerHTML=actions.map(a=>`
    <a class="action" href="${a.href}" ${a.href.startsWith('http')?'target="_blank" rel="noopener"':''}>
      <span class="action-icon">${ICONS[a.icon]}</span>
      <span class="action-body">
        <span class="action-label">${a.label}</span>
        <span class="action-value">${a.value}</span>
      </span>
      ${ICONS.chevron}
    </a>`).join('');
}

function buildVCard(){
  return['BEGIN:VCARD','VERSION:3.0',
    `N:${PROFILE.lastName};${PROFILE.firstName};;${PROFILE.honorific||''};`,
    `FN:${fullName()}`,
    PROFILE.company?`ORG:${PROFILE.company}`:'',
    PROFILE.title?`TITLE:${PROFILE.title}`:'',
    PROFILE.phone?`TEL;TYPE=CELL,VOICE:${PROFILE.phone.replace(/\s/g,'')}`:'',
    PROFILE.email?`EMAIL;TYPE=INTERNET:${PROFILE.email}`:'',
    PROFILE.website?`URL:${PROFILE.website}`:'',
    PROFILE.linkedin?`X-SOCIALPROFILE;TYPE=linkedin:${PROFILE.linkedin}`:'',
    'END:VCARD'].filter(Boolean).join('\r\n');
}

function saveContact(){
  const blob=new Blob([buildVCard()],{type:'text/vcard;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='Javier_Matias_Henriquez.vcf';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast(T.saved);
}

async function shareCard(){
  const data={title:`${T.shareTitle} ${fullName()}`,text:`${fullName()} — ${PROFILE.title}`,url:window.location.href};
  if(navigator.share){try{await navigator.share(data)}catch(e){}}
  else{try{await navigator.clipboard.writeText(window.location.href);showToast(T.copied)}catch(e){}}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2400);
}

render();
</script>
</body>
